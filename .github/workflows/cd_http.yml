name:Deploy the http server
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
 jobs:
   build:
     runs-on: ubuntu-latest
     steps:
       - name:Checkout the code
       - uses: actions/checkout@v2

       - name: Docker login
         uses: docker/login-action@v2
         with:
           username:${{ secrets.DOCKER_USERNAME }}
           password:${{ secrets.DOCKER_PASSWORD }}

       - name: Build and push
         uses: docker/build-push-action@v4
         with: 
           contex: .      
             file: ./apps/http-server/Dockerfile
             push: true
             tags: riadofficial/enterprise-Cold-Email-and-Outreach-Platform-http-server:${{github.sha}}

