version: "3.8"

services:
  postgres:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: coldMailAndOutrech
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  http-server:
    build:
      context: .
      dockerfile: apps/http-server/Dockerfile
      args:
        DATABASE_URL: postgresql://postgres:mypassword@postgres:5432/coldMailAndOutrech
        HTTP_PORT: 4000

    environment:
      DATABASE_URL: postgresql://postgres:mypassword@postgres:5432/coldMailAndOutrech
      HTTP_PORT: 4000

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        DATABASE_URL: postgresql://postgres:mypassword@postgres:5432/coldMailAndOutrech
        HTTP_PORT: 4000

    environment:
      DATABASE_URL: postgresql://postgres:mypassword@postgres:5432/coldMailAndOutrech
      HTTP_PORT: 4000

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "3000:3000"